    <style>
        /* Estilo general del contenedor de búsqueda */
        .leaflet-control-search {
            border: none !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15) !important;
            border-radius: 25px !important;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .leaflet-control-search .search-input {
            padding: 8px 15px !important;
            border-radius: 25px !important;
            border: 1px solid #eee !important;
            font-family: 'Segoe UI', sans-serif;
        }
        .leaflet-control-search.search-exp .search-input {
            width: 250px !important;
        }
        .leaflet-control-search .search-button {
            background-color: #fff !important;
            border-radius: 50% !important;
            width: 34px !important;
            height: 34px !important;
        }

        /* Estilo para el Control de Capas (Vendedores) */
        .leaflet-control-layers {
            border: none !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
            border-radius: 12px !important;
            padding: 10px !important;
            font-family: 'Segoe UI', sans-serif;
        }
        .leaflet-control-layers-toggle {
            width: 40px !important;
            height: 40px !important;
            background-size: 25px !important;
        }

        /* Estilo para los botones de Zoom */
        .leaflet-bar {
            border: none !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
        }
        .leaflet-bar a {
            background-color: white !important;
            color: #333 !important;
            border: 1px solid #f0f0f0 !important;
        }
        .leaflet-bar a:first-child { border-top-left-radius: 8px !important; border-top-right-radius: 8px !important; }
        .leaflet-bar a:last-child { border-bottom-left-radius: 8px !important; border-bottom-right-radius: 8px !important; }

        /* Mejora de los tooltips */
        .leaflet-tooltip {
            background-color: rgba(255, 255, 255, 0.9) !important;
            border: none !important;
            border-radius: 6px !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 600;
        }
        /* Mejora del listado de resultados del buscador */
        .leaflet-control-search .search-tip {
            padding: 8px !important;
            border-bottom: 1px solid #f0f0f0;
            font-size: 13px !important;
            cursor: pointer;
            transition: background 0.2s;
        }
        .leaflet-control-search .search-tip:hover {
            background-color: #f8f9fa !important;
            color: #000 !important;
        }
        .leaflet-control-search .search-tooltip {
            max-height: 300px !important;
            overflow-y: auto !important;
            border-radius: 12px !important;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
            border: none !important;
            background: white !important;
        }
    </style>

        function toggleNavPanel() {
            var panel = document.getElementById('nav-panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                renderRutas();
            } else {
                panel.style.display = 'none';
            }
        }

        function renderRutas() {
            var container = document.getElementById('nav-links-container');
            container.innerHTML = '';
            
            for (var vendedor in infoRutas) {
                var section = document.createElement('div');
                section.style.marginBottom = '15px';
                section.innerHTML = '<strong style="color: #666; font-size: 13px; display: block; margin-bottom: 5px;">👤 ' + vendedor + '</strong>';
                
                infoRutas[vendedor].forEach(function(link) {
                    var a = document.createElement('a');
                    a.href = link.url;
                    a.target = '_blank';
                    a.className = 'nav-link-btn';
                    a.innerHTML = link.nombre;
                    a.style.display = 'block';
                    a.style.background = '#f1f3f4';
                    a.style.color = '#1a73e8';
                    a.style.padding = '8px 12px';
                    a.style.borderRadius = '8px';
                    a.style.marginBottom = '5px';
                    a.style.textDecoration = 'none';
                    a.style.fontSize = '12px';
                    a.style.fontWeight = '600';
                    a.onmouseover = function() { this.style.background = '#e8f0fe'; };
                    a.onmouseout = function() { this.style.background = '#f1f3f4'; };
                    section.appendChild(a);
                });
                container.appendChild(section);
            }
        }
