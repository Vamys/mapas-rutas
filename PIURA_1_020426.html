        function toggleNavPanel() {
            var panel = document.getElementById('nav-panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                renderRutas();
            } else {

        function renderRutas() {
            var container = document.getElementById('nav-links-container');
            container.innerHTML = '';
            
            for (var vendedor in infoRutas) {
                var section = document.createElement('div');
                section.style.marginBottom = '15px';
                section.innerHTML = '<strong style="color: #666; font-size: 13px; display: block; margin-bottom: 5px;">👤 ' + vendedor + '</strong>';
                
                infoRutas[vendedor].forEach(function(link) {
                    var a = document.createElement('a');
                    a.href = link.url;
                    a.target = '_blank';
                    a.className = 'nav-link-btn';
                    a.innerHTML = link.nombre;
                    a.style.display = 'block';
                    a.style.background = '#f1f3f4';
                    a.style.color = '#1a73e8';
                    a.style.padding = '8px 12px';
                    a.style.borderRadius = '8px';
                    a.style.marginBottom = '5px';
                    a.style.textDecoration = 'none';
                    a.style.fontSize = '12px';
                    a.style.fontWeight = '600';
                    a.onmouseover = function() { this.style.background = '#e8f0fe'; };
                    a.onmouseout = function() { this.style.background = '#f1f3f4'; };
                    section.appendChild(a);
                });
                container.appendChild(section);
            }
        }

    <script>
        window._mapaEntregas = {};

        document.addEventListener("DOMContentLoaded", function() {
            var map = document.querySelector('.folium-map')._leaflet_map;

            function getAllMarkers(layer, out) {
                if (layer instanceof L.Marker) {
                    out.push(layer);
                } else if (typeof layer.getLayers === 'function') {
                    layer.getLayers().forEach(function(sub) { getAllMarkers(sub, out); });
                }
            }

            function registrarMarcadores() {
                var todos = [];
                map.eachLayer(function(l) { getAllMarkers(l, todos); });
                todos.forEach(function(marker) {
                    if (!marker._popup || !marker._popup._content) return;
                    try {
                        var parser = new DOMParser();
                        var doc = parser.parseFromString(marker._popup._content, 'text/html');
                        var sn = doc.querySelector('.bodega-nombre');
                        var sc = doc.querySelector('.bodega-color');
                        if (sn) {
                            var nombre = sn.textContent.trim();
                            var color  = sc ? sc.textContent.trim() : 'blue';
                            window._mapaEntregas[nombre] = { marker: marker, colorOriginal: color };
                        }
                    } catch(ex) {}
                });
            }

            setTimeout(registrarMarcadores, 800);
            setTimeout(registrarMarcadores, 2500);

            function iconoNuevo(color, entregado) {
                if (entregado) {
                    return L.AwesomeMarkers.icon({ icon: 'ok', prefix: 'glyphicon', markerColor: 'black' });
                }
                return L.AwesomeMarkers.icon({ icon: 'info-sign', prefix: 'glyphicon', markerColor: color });
            }

            function aplicarEstados() {
                for (var n in window._mapaEntregas) {
                    if (localStorage.getItem('entregado_' + n)) {
                        try {
                            var d = window._mapaEntregas[n];
                            d.marker.setIcon(iconoNuevo(d.colorOriginal, true));
                            if (d.marker._icon) d.marker._icon.style.opacity = '0.4';
                        } catch(ex) {}
                    }
                }
            }

            setTimeout(aplicarEstados, 1000);
            setTimeout(aplicarEstados, 3000);
            map.on('zoomend moveend', function() { setTimeout(aplicarEstados, 200); });

            window.toggleEntregado = function(btn) {
                try {
                    var marker = map._popup._source;
                    if (!marker) return;

                    var span = map._popup._wrapper.querySelector('.bodega-nombre');
                    if (!span) return;
                    var nombre = span.textContent.trim();
                    var key    = 'entregado_' + nombre;

                    var colorOriginal = 'blue';
                    if (window._mapaEntregas[nombre]) {
                        colorOriginal = window._mapaEntregas[nombre].colorOriginal;
                    } else {
                        var sc = map._popup._wrapper.querySelector('.bodega-color');
                        if (sc) colorOriginal = sc.textContent.trim();
                        window._mapaEntregas[nombre] = { marker: marker, colorOriginal: colorOriginal };
                    }

                    var estaEntregado = !!localStorage.getItem(key);
                    if (estaEntregado) {
                        localStorage.removeItem(key);
                        marker.setIcon(iconoNuevo(colorOriginal, false));
                        if (marker._icon) marker._icon.style.opacity = '1';
                        btn.innerHTML = '✅ MARCAR ENTREGADO';
                        btn.style.backgroundColor = '#f8f9fa';
                        btn.style.color = '#333';
                    } else {
                        localStorage.setItem(key, 'true');
                        marker.setIcon(iconoNuevo(colorOriginal, true));
                        if (marker._icon) marker._icon.style.opacity = '0.4';
                        btn.innerHTML = '❌ DESHACER (Entregado)';
                        btn.style.backgroundColor = '#e0e0e0';
                        btn.style.color = '#555';
                    }
                } catch(ex) { console.error('toggleEntregado:', ex); }
            };

            map.on('popupopen', function(e) {
                try {
                    var btn  = e.popup._wrapper.querySelector('.btn-entregado');
                    var span = e.popup._wrapper.querySelector('.bodega-nombre');
                    if (!btn || !span) return;
                    var nombre = span.textContent.trim();
                    if (localStorage.getItem('entregado_' + nombre)) {
                        btn.innerHTML = '❌ DESHACER (Entregado)';
                        btn.style.backgroundColor = '#e0e0e0';
                        btn.style.color = '#555';
                    } else {
                        btn.innerHTML = '✅ MARCAR ENTREGADO';
                        btn.style.backgroundColor = '#f8f9fa';
                        btn.style.color = '#333';
                    }
                } catch(ex) {}
            });
        });
    </script>
