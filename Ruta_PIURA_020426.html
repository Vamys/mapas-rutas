        /* Estilo general del contenedor de búsqueda */
        .leaflet-control-search {
            border: none !important;

        .leaflet-control-search .search-tooltip {

        function toggleNavPanel() {
            var panel = document.getElementById('nav-panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                renderRutas();
            } else {
                panel.style.display = 'none';
            }
        }

        function renderRutas() {
            var container = document.getElementById('nav-links-container');
            container.innerHTML = '';
            
            for (var vendedor in infoRutas) {
                var section = document.createElement('div');
                section.style.marginBottom = '15px';
                section.innerHTML = '<strong style="color: #666; font-size: 13px; display: block; margin-bottom: 5px;">👤 ' + vendedor + '</strong>';
                
                infoRutas[vendedor].forEach(function(link) {
                    var a = document.createElement('a');
                    a.href = link.url;
                    a.target = '_blank';
                    a.className = 'nav-link-btn';
                    a.innerHTML = link.nombre;
                    a.style.display = 'block';
                    a.style.background = '#f1f3f4';
                    a.style.color = '#1a73e8';
                    a.style.padding = '8px 12px';
                    a.style.borderRadius = '8px';
                    a.style.marginBottom = '5px';
                    a.style.textDecoration = 'none';
                    a.style.fontSize = '12px';
                    a.style.fontWeight = '600';
                    a.onmouseover = function() { this.style.background = '#e8f0fe'; };
                    a.onmouseout = function() { this.style.background = '#f1f3f4'; };
                    section.appendChild(a);
                });
                container.appendChild(section);
            }
        }
    </script>

    <script>
        // Referencia al marcador actual (se actualiza en popupopen)
        window._currentMarker = null;
        window._mapaColores = {};  // nombre -> colorOriginal

        document.addEventListener("DOMContentLoaded", function() {
            var map = document.querySelector('.folium-map')._leaflet_map;

            function iconoNuevo(color, entregado) {
                if (entregado) {
                    return L.AwesomeMarkers.icon({ icon: 'ok', prefix: 'glyphicon', markerColor: 'black' });
                }
                return L.AwesomeMarkers.icon({ icon: 'info-sign', prefix: 'glyphicon', markerColor: color });
            }

            // Al ABRIR un popup: guardamos el marcador fuente y actualizamos el boton
            map.on('popupopen', function(e) {
                // Guardar referencia directa al marker que abrio el popup
                window._currentMarker = e.popup._source;

                try {
                    var wrapper = e.popup._wrapper;
                    var btn  = wrapper.querySelector('.btn-entregado');
                    var span = wrapper.querySelector('.bodega-nombre');
                    var spanColor = wrapper.querySelector('.bodega-color');
                    if (!btn || !span) return;

                    var nombre = span.textContent.trim();
                    var color  = spanColor ? spanColor.textContent.trim() : 'blue';

                    // Guardar color original de este marcador
                    if (!window._mapaColores[nombre]) {
                        window._mapaColores[nombre] = color;
                    }

                    // Mostrar estado correcto en el boton
                    if (localStorage.getItem('entregado_' + nombre)) {
                        btn.innerHTML = '❌ DESHACER (Entregado)';
                        btn.style.backgroundColor = '#e0e0e0';
                        btn.style.color = '#555';
                    } else {
                        btn.innerHTML = '✅ MARCAR ENTREGADO';
                        btn.style.backgroundColor = '#f8f9fa';
                        btn.style.color = '#333';
                    }
                } catch(ex) { console.error('popupopen error:', ex); }
            });

            // Funcion que llama el boton
            window.toggleEntregado = function(btn) {
                try {
                    var marker = window._currentMarker;
                    if (!marker) { console.warn('No hay marcador activo'); return; }

                    var span = btn.parentElement.querySelector('.bodega-nombre') ||
                               document.querySelector('.leaflet-popup-content .bodega-nombre');
                    // Buscar en el popup abierto
                    var wrapper = document.querySelector('.leaflet-popup-content-wrapper');
                    if (wrapper) span = wrapper.querySelector('.bodega-nombre');
                    if (!span) { console.warn('No se encontro span nombre'); return; }

                    var nombre = span.textContent.trim();
                    var key = 'entregado_' + nombre;
                    var color = window._mapaColores[nombre] || 'blue';
                    var estaEntregado = !!localStorage.getItem(key);

                    if (estaEntregado) {
                        localStorage.removeItem(key);
                        marker.setIcon(iconoNuevo(color, false));
                        if (marker._icon) marker._icon.style.opacity = '1';
                        btn.innerHTML = '✅ MARCAR ENTREGADO';
                        btn.style.backgroundColor = '#f8f9fa';
                        btn.style.color = '#333';
                    } else {
                        localStorage.setItem(key, 'true');
                        marker.setIcon(iconoNuevo(color, true));
                        if (marker._icon) marker._icon.style.opacity = '0.4';
                        btn.innerHTML = '❌ DESHACER (Entregado)';
                        btn.style.backgroundColor = '#e0e0e0';
                        btn.style.color = '#555';
                    }
                    console.log('Marcador', nombre, estaEntregado ? 'desmarcado' : 'entregado');
                } catch(ex) { console.error('toggleEntregado error:', ex); }
            };

            // Re-aplicar estados al moverse/zoom (MarkerCluster regenera iconos)
            function aplicarEstadosGuardados() {
                // Solo aplicamos a los que tenemos referencia
                for (var nombre in window._mapaColores) {
                    if (localStorage.getItem('entregado_' + nombre)) {
                        // El icono se aplicara la proxima vez que abran el popup de ese pin
                        // Para los visibles, aplicar inmediatamente
                    }
                }
            }
        });
    </script>
