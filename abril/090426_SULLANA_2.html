<script>
    // Mapa nombre_bodega -> Leaflet Marker (registrado en popupopen)
    window._entregaMarkers = {};
    // Marker cuyo popup esta abierto en este momento
    window._markerActual = null;

    document.addEventListener("DOMContentLoaded", function() {
        var mapEl = document.querySelector('.folium-map');
        if (!mapEl) return;
        var map = mapEl._leaflet_map;

        // ── Visual: aplicar/quitar grayscale sobre el icono del pin ──────────
        function marcarVisual(marker, entregado) {
            if (!marker || !marker._icon) return;
            if (entregado) {
                marker._icon.style.filter  = 'grayscale(100%) brightness(0.45)';
                marker._icon.style.opacity = '0.55';
            } else {
                marker._icon.style.filter  = '';
                marker._icon.style.opacity = '1';
            }
        }

        // ── Re-aplicar estados tras zoom/pan ──────────
        function reAplicarEstados() {
            map.eachLayer(function(layer) {
                if ((layer instanceof L.Marker || layer instanceof L.MarkerCluster) && layer.options && layer.options.alt) {
                    var nombre = layer.options.alt;
                    if (localStorage.getItem('_ent_' + nombre)) {
                        marcarVisual(layer, true);
                    }
                }
            });
        }
        map.on('zoomend moveend spiderfied popupopen', function() { setTimeout(reAplicarEstados, 300); });

        // ── Actualizar texto/color del boton segun estado ────────────────────
        function actualizarBoton(btn, entregado) {
            if (entregado) {
                btn.innerHTML = '&#9989; ENTREGADO (Deshacer)';
                btn.style.background = '#27ae60';
                btn.style.color      = 'white';
            } else {
                btn.innerHTML = '&#9744; MARCAR ENTREGADO';
                btn.style.background = '#f8f9fa';
                btn.style.color      = '#333';
            }
        }

        // ── Al abrir un popup: guardar referencia del marker y sync boton ────
        map.on('popupopen', function(e) {
            var marker = e.popup._source;
            if (!marker) return;
            
            var wrapper = e.popup._wrapper;
            var span = wrapper.querySelector('.bodega-nombre');
            var btn  = wrapper.querySelector('.btn-entregado');
            if (!span || !btn) return;
            
            var nombre = span.textContent.trim();
            window._markerActual = marker;
            
            // Garantizar que el marcador tenga el nombre en sus opciones
            if (marker.options) marker.options.alt = nombre;
            
            actualizarBoton(btn, !!localStorage.getItem('_ent_' + nombre));
            console.log("Popup abierto para:", nombre);
        });

        // ── Funcion llamada por onclick del boton Entregado ──────────────────
        window.toggleEntregado = function(btn) {
            console.log("Click en entregar...");
            var wrapper = btn.closest('.leaflet-popup-content-wrapper');
            var span = wrapper ? wrapper.querySelector('.bodega-nombre') : null;
            if (!span) {
                console.error("No se encontró el nombre de la bodega");
                return;
            }

            var nombre  = span.textContent.trim();
            var marker  = window._markerActual;
            
            // Si el marcador global no coincide, buscarlo por nombre en el mapa
            if (!marker || (marker.options && marker.options.alt !== nombre)) {
                map.eachLayer(function(l) {
                    if (l.options && l.options.alt === nombre) { marker = l; }
                });
            }

            var key = '_ent_' + nombre;
            var yaEntregado = !!localStorage.getItem(key);
            var nuevoEstado = !yaEntregado;

            if (nuevoEstado) { 
                localStorage.setItem(key, '1'); 
            } else { 
                localStorage.removeItem(key); 
            }

            if (marker) {
                marcarVisual(marker, nuevoEstado);
                window._markerActual = marker;
            }
            actualizarBoton(btn, nuevoEstado);
            console.log("Estado de", nombre, "cambiado a:", nuevoEstado);
        };

        setTimeout(reAplicarEstados, 1500);
        setTimeout(reAplicarEstados, 4000);
    });
</script>
