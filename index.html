<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Rutas - Vamys</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3498db">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vamys Rutas">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: #2c3e50; margin-bottom: 6px; }
        p  { color: #666; margin-top: 0; }
        .container {
            max-width: 800px; width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px; margin-top: 20px;
        }
        .btn {
            background: #3498db; color: white;
            padding: 20px; text-decoration: none;
            border-radius: 10px; text-align: center;
            font-weight: bold; font-size: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.12);
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover { background: #2980b9; transform: translateY(-2px); }
    </style>
</head>
<body>
    <h1>&#128506; Portal de Rutas</h1>
    <p>Selecciona una ruta para visualizarla en el mapa:</p>
    <div class="container">
        <a href="Mapa_General.html" class="btn">Mapa General</a>
    </div>

    <script>
        // Registro del Service Worker para PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.log('Error registrando SW', err));
            });
        }
    </script>
</body>
</html>
