<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Rutas - Vamys</title>

    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#3498db">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Vamys Rutas">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="manifest" href="manifest.json">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7f6;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }
        h1 { color: #2c3e50; margin-bottom: 6px; }
        p  { color: #666; margin-top: 0; }
        .container {
            max-width: 800px; width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px; margin-top: 20px;
        }
        .btn {
            background: #3498db; color: white;
            padding: 20px; text-decoration: none;
            border-radius: 10px; text-align: center;
            font-weight: bold; font-size: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.12);
            transition: transform 0.2s, background 0.2s;
        }
        .btn:hover { background: #2980b9; transform: translateY(-2px); }

        /* PWA Install Banner */
        .install-banner {
            display: none;
            background: #2c3e50; color: white;
            padding: 15px; border-radius: 12px;
            margin-bottom: 20px; width: 90%; max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            flex-direction: column; align-items: center; gap: 10px;
            text-align: center; animation: slideIn 0.5s ease;
        }
        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .btn-install {
            background: #27ae60; color: white; border: none;
            padding: 10px 20px; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .btn-install:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <h1>&#128506; Portal de Rutas</h1>
    <p>Selecciona una ruta para visualizarla en el mapa:</p>

    <!-- Banner de Instalación PWA -->
    <div id="install-banner" class="install-banner">
        <p style="margin:0; font-size:14px;">&#128241; ¡Instala esta app para acceder rápido y sin conexión!</p>
        <button id="btn-install" class="btn-install">INSTALAR AHORA</button>
    </div>

    <div class="container">
        <a href="anyi_0905.html" class="btn">anyi 0905</a>
    </div>

    <script>
        // --- Lógica de Instalación PWA ---
        let deferredPrompt;
        const installBanner = document.getElementById('install-banner');
        const btnInstall = document.getElementById('btn-install');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevenir que el navegador muestre el prompt automático
            e.preventDefault();
            deferredPrompt = e;
            // Mostrar nuestro banner personalizado
            installBanner.style.display = 'flex';
        });

        btnInstall.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            // Mostrar el prompt nativo
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User response to the install prompt: ${outcome}`);
            if (outcome === 'accepted') {
                installBanner.style.display = 'none';
            }
            deferredPrompt = null;
        });

        window.addEventListener('appinstalled', () => {
            installBanner.style.display = 'none';
            console.log('App instalada con éxito');
        });

        // --- Registro del Service Worker ---
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registrado', reg))
                    .catch(err => console.log('Error registrando SW', err));
            });
        }
    </script>
</body>
</html>
