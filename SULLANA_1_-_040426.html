</a>

<script>
    // Mapa nombre_bodega -> Leaflet Marker (registrado en popupopen)
    window._entregaMarkers = {};
    // Marker cuyo popup esta abierto en este momento
    window._markerActual   = null;

    document.addEventListener("DOMContentLoaded", function() {
        var mapEl = document.querySelector('.folium-map');
        if (!mapEl) return;
        var map = mapEl._leaflet_map;

        // ── Visual: aplicar/quitar grayscale sobre el icono del pin ──────────
        function marcarVisual(marker, entregado) {
            if (!marker || !marker._icon) return;
            if (entregado) {
                marker._icon.style.filter  = 'grayscale(100%) brightness(0.45)';
                marker._icon.style.opacity = '0.55';
            } else {
                marker._icon.style.filter  = '';
                marker._icon.style.opacity = '1';
            }
        }

        // ── Re-aplicar estados tras zoom/pan (MarkerCluster recrea iconos) ──
        function reAplicarEstados() {
            for (var n in window._entregaMarkers) {
                if (localStorage.getItem('_ent_' + n)) {
                    marcarVisual(window._entregaMarkers[n], true);
                }
            }
        }
        map.on('zoomend moveend', function() { setTimeout(reAplicarEstados, 200); });

        // ── Actualizar texto/color del boton segun estado ────────────────────
        function actualizarBoton(btn, entregado) {
            if (entregado) {
                btn.textContent = '\u2714 ENTREGADO  (toca para deshacer)';
                btn.style.background = '#27ae60';
                btn.style.color      = 'white';
                btn.style.border     = 'none';
            } else {
                btn.textContent = '\u2610 MARCAR ENTREGADO';
                btn.style.background = '#f8f9fa';
                btn.style.color      = '#333';
                btn.style.border     = '1px solid #ccc';
            }
        }

        // ── Al abrir un popup: guardar referencia del marker y sync boton ────
        map.on('popupopen', function(e) {
            window._markerActual = e.popup._source;
            var wrapper = e.popup._wrapper;
            if (!wrapper) return;
            var span = wrapper.querySelector('.bodega-nombre');
            var btn  = wrapper.querySelector('.btn-entregado');
            if (!span || !btn) return;
            var nombre = span.textContent.trim();
            window._entregaMarkers[nombre] = window._markerActual;
            actualizarBoton(btn, !!localStorage.getItem('_ent_' + nombre));
        });

        // ── Funcion llamada por onclick del boton Entregado ──────────────────
        window.toggleEntregado = function(btn) {
            // Leer nombre desde el popup abierto (DOM real, no el string)
            var wrapper = document.querySelector('.leaflet-popup-content-wrapper');
            if (!wrapper) return;
            var span = wrapper.querySelector('.bodega-nombre');
            if (!span) return;

            var nombre  = span.textContent.trim();
            var key     = '_ent_' + nombre;
            var nuevo   = !localStorage.getItem(key);   // invertir estado

            if (nuevo) { localStorage.setItem(key, '1'); }
            else        { localStorage.removeItem(key); }

            // Cambiar color del pin
            var marker = window._markerActual;
            if (marker) {
                window._entregaMarkers[nombre] = marker;
                marcarVisual(marker, nuevo);
            }

            // Cambiar aspecto del boton
            actualizarBoton(btn, nuevo);
        };

        // Aplicar estados guardados al cargar la pagina (2 intentos por si el mapa tarda)
        setTimeout(reAplicarEstados, 1000);
        setTimeout(reAplicarEstados, 3000);
    });
</script>
