        /* Estilo general del contenedor de búsqueda */
        .leaflet-control-search {
            border: none !important;

                    a.onmouseout = function() { this.style.background = '#f1f3f4'; };

                });

    <script>
        // nombre_bodega -> referencia al Leaflet Marker
        window._entregaMarkers = {};
        // Marcador cuyo popup esta abierto ahora mismo
        window._markerActual = null;

        document.addEventListener("DOMContentLoaded", function() {
            var map = document.querySelector('.folium-map')._leaflet_map;

            // ── Aplicar estado visual de entregado ──────────────────────────
            function marcarVisual(marker, entregado) {
                if (!marker || !marker._icon) return;
                if (entregado) {
                    // Poner en escala de grises y mas opaco con check verde encima
                    marker._icon.style.filter = 'grayscale(100%) brightness(0.5)';
                    marker._icon.style.opacity = '0.6';
                } else {
                    marker._icon.style.filter  = '';
                    marker._icon.style.opacity = '1';
                }
            }

            // ── Re-aplicar estados guardados (despues de zoom/mover) ────────
            function reAplicarEstados() {
                for (var nombre in window._entregaMarkers) {
                    if (localStorage.getItem('_ent_' + nombre)) {
                        marcarVisual(window._entregaMarkers[nombre], true);
                    }
                }
            }
            // MarkerCluster regenera los iconos al hacer zoom: re-aplicar
            map.on('zoomend moveend', function() {
                setTimeout(reAplicarEstados, 150);
            });

            // ── Al abrir popup: registrar marcador y actualizar boton ───────
            map.on('popupopen', function(e) {
                window._markerActual = e.popup._source;
                var wrapper = e.popup._wrapper;
                if (!wrapper) return;

                var span = wrapper.querySelector('.bodega-nombre');
                var btn  = wrapper.querySelector('.btn-entregado');
                if (!span || !btn) return;

                var nombre = span.textContent.trim();

                // Registrar referencia del marcador por nombre
                window._entregaMarkers[nombre] = window._markerActual;

                // Sincronizar texto del boton con el estado real
                var yaEntregado = !!localStorage.getItem('_ent_' + nombre);
                actualizarBoton(btn, yaEntregado);
            });

            // ── Actualizar apariencia del boton ─────────────────────────────
            function actualizarBoton(btn, entregado) {
                if (entregado) {
                    btn.textContent  = '✔ ENTREGADO - Toca para deshacer';
                    btn.style.background = '#2ecc71';
                    btn.style.color      = 'white';
                    btn.style.border     = 'none';
                } else {
                    btn.textContent  = '☐ MARCAR ENTREGADO';
                    btn.style.background = '#f8f9fa';
                    btn.style.color      = '#333';
                    btn.style.border     = '1px solid #ccc';
                }
            }

            // ── Funcion global llamada por onclick del boton ─────────────────
            window.toggleEntregado = function(btn) {
                var marker = window._markerActual;
                var wrapper = document.querySelector('.leaflet-popup-content-wrapper');
                if (!wrapper) return;
                var span = wrapper.querySelector('.bodega-nombre');
                if (!span) return;

                var nombre = span.textContent.trim();
                var key    = '_ent_' + nombre;
                var ahora  = !!localStorage.getItem(key);

                // Invertir estado
                var nuevo = !ahora;
                if (nuevo) {
                    localStorage.setItem(key, '1');
                } else {
                    localStorage.removeItem(key);
                }

                // Actualizar visual del pin
                if (marker) {
                    window._entregaMarkers[nombre] = marker;
                    marcarVisual(marker, nuevo);
                }

                // Actualizar boton
                actualizarBoton(btn, nuevo);
            };

            // Aplicar estados guardados al cargar
            setTimeout(reAplicarEstados, 1200);
            setTimeout(reAplicarEstados, 3000);
        });
    </script>
