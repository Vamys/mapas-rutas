        /* Estilo general del contenedor de búsqueda */
        .leaflet-control-search {
            border: none !important;

            width: 250px !important;

            border: none !important;

        /* Mejora de los tooltips */

            border-radius: 6px !important;

            font-weight: 600;

            font-size: 13px !important;

        .leaflet-control-search .search-tip:hover {

            color: #000 !important;

        .leaflet-control-search .search-tooltip {

            border-radius: 12px !important;

    <script>
        var infoRutas = {"KATHERINE REBECA DE JESUS CARDOZA LEE": [{"nombre": "Tramo 1 (JOSE ALEX CUNYA CANGO ... JAZMIN ESTELA GARCIA HUAMAN)", "url": "https://www.google.com/maps/dir/?api=1&destination=-5.18729,-80.5962652&waypoints=-5.1870747%2C-80.5960276%7C-5.1877389%2C-80.633916%7C-5.1877389%2C-80.633916%7C-5.1870778%2C-80.6340343%7C-5.1874032%2C-80.6336537%7C-5.1873426%2C-80.6331423%7C-5.1873276%2C-80.6332521%7C-5.1876358%2C-80.6348231%7C-5.1873986%2C-80.6339045"}, {"nombre": "Tramo 2 (JACQUELINE COBE\u00d1AS MOROCHO ... LUZ MARIA NAQUICHE YOVERA)", "url": "https://www.google.com/maps/dir/?api=1&destination=-5.1875688,-80.6336977&waypoints=-5.18767%2C-80.6334793%7C-5.1875545%2C-80.6338668%7C-5.1875214%2C-80.6338683%7C-5.1870747%2C-80.5960276"}]};
        
        function toggleNavPanel() {
            var panel = document.getElementById('nav-panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                renderRutas();
            } else {
                panel.style.display = 'none';
            }
        }

        function renderRutas() {
            var container = document.getElementById('nav-links-container');
            container.innerHTML = '';
            
            for (var vendedor in infoRutas) {
                var section = document.createElement('div');
                section.style.marginBottom = '15px';
                section.innerHTML = '<strong style="color: #666; font-size: 13px; display: block; margin-bottom: 5px;">👤 ' + vendedor + '</strong>';
                
                infoRutas[vendedor].forEach(function(link) {
                    var a = document.createElement('a');
                    a.href = link.url;
                    a.target = '_blank';
                    a.className = 'nav-link-btn';
                    a.innerHTML = link.nombre;
                    a.style.display = 'block';
                    a.style.background = '#f1f3f4';
                    a.style.color = '#1a73e8';
                    a.style.padding = '8px 12px';
                    a.style.borderRadius = '8px';
                    a.style.marginBottom = '5px';
                    a.style.textDecoration = 'none';
                    a.style.fontSize = '12px';
                    a.style.fontWeight = '600';
                    a.onmouseover = function() { this.style.background = '#e8f0fe'; };
                    a.onmouseout = function() { this.style.background = '#f1f3f4'; };
                    section.appendChild(a);
                });
                container.appendChild(section);
            }
        }
    </script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var map = document.querySelector('.folium-map')._leaflet_map;
            
            window.toggleEntregado = function(btn) {
                var container = btn.parentElement;
                var spanNombre = container.querySelector('.bodega-nombre');
                if (!spanNombre) return;
                
                var nombre = spanNombre.textContent;
                var key = 'entregado_' + nombre;
                
                if (localStorage.getItem(key)) {
                    localStorage.removeItem(key);
                } else {
                    localStorage.setItem(key, 'true');
                }
                window.verificarEntregados(map);
                
                // Actualizar boton dentro del popup inmediatamente
                if (localStorage.getItem(key)) {
                    btn.innerHTML = "❌ DESHACER (Entregado)";
                    btn.style.backgroundColor = "#e0e0e0";
                } else {
                    btn.innerHTML = "✅ MARCAR ENTREGADO";
                    btn.style.backgroundColor = "#f8f9fa";
                }
            }

            window.verificarEntregados = function(map) {
                map.eachLayer(function(layer) {
                    if (layer instanceof L.Marker && layer._popup && layer._popup._content) {
                        try {
                            var parser = new DOMParser();
                            var doc = parser.parseFromString(layer._popup._content, 'text/html');
                            var span = doc.querySelector('.bodega-nombre');
                            if (span) {
                                var nombre = span.textContent;
                                var isEntregado = localStorage.getItem('entregado_' + nombre);
                                var iconDiv = layer._icon;
                                if (iconDiv) {
                                    var spanColor = doc.querySelector('.bodega-color');
                                    var oColor = spanColor ? spanColor.textContent : 'blue';
                                    
                                    iconDiv.className = iconDiv.className.replace(/awesome-marker-icon-[a-z]+/, '');
                                    
                                    if (isEntregado) {
                                        iconDiv.className += ' awesome-marker-icon-black';
                                        iconDiv.style.opacity = '0.4';
                                    } else {
                                        iconDiv.className += ' awesome-marker-icon-' + oColor;
                                        iconDiv.style.opacity = '1';
                                    }
                                }
                            }
                        } catch(e) {}
                    }
                });
            }
            
            map.on('zoomend', function() { setTimeout(function(){ window.verificarEntregados(map); }, 100); });
            map.on('moveend', function() { setTimeout(function(){ window.verificarEntregados(map); }, 100); });
            
            map.on('popupopen', function(e) {
                try {
                    var btn = e.popup._wrapper.querySelector('.btn-entregado');
                    var span = e.popup._wrapper.querySelector('.bodega-nombre');
                    if (btn && span) {
                        var nombre = span.textContent;
                        var isEntregado = localStorage.getItem('entregado_' + nombre);
                        if (isEntregado) {
                            btn.innerHTML = "❌ DESHACER (Entregado)";
                            btn.style.backgroundColor = "#e0e0e0";
                        } else {
                            btn.innerHTML = "✅ MARCAR ENTREGADO";
                            btn.style.backgroundColor = "#f8f9fa";
                        }
                    }
                } catch(e) {}
            });
            
            setTimeout(function(){ window.verificarEntregados(map); }, 500);
            setTimeout(function(){ window.verificarEntregados(map); }, 2000);
        });
    </script>
