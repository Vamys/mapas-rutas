    }
    .leaflet-bar {
        border: none !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1) !important;
    }
    .leaflet-bar a {
        background-color: white !important;
        color: #333 !important;
        border: 1px solid #f0f0f0 !important;
    }
    .leaflet-bar a:first-child { border-radius: 8px 8px 0 0 !important; }
    .leaflet-bar a:last-child  { border-radius: 0 0 8px 8px !important; }
    .leaflet-tooltip {
        background: rgba(255,255,255,0.95) !important;
        border: none !important;
        border-radius: 6px !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15) !important;
        font-family: 'Segoe UI', sans-serif;
        font-weight: 600;
    }
    .leaflet-control-search .search-tip {
        padding: 8px !important;
        border-bottom: 1px solid #f0f0f0;
        font-size: 13px !important;
        cursor: pointer;
    }
    .leaflet-control-search .search-tip:hover { background: #f8f9fa !important; }
    .leaflet-control-search .search-tooltip {
        max-height: 300px !important;
        overflow-y: auto !important;
        border-radius: 12px !important;
        box-shadow: 0 4px 15px rgba(0,0,0,0.2) !important;
        border: none !important;
        background: white !important;
    }
    /* Filtro para marcar entregados: convierte cualquier color a verde intenso */

        filter: hue-rotate(140deg) brightness(0.8) saturate(5) !important;

    }
