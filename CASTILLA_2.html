    function toggleNavPanel() {
        var p = document.getElementById('nav-panel');
        p.style.display = (p.style.display === 'none') ? 'block' : 'none';
        if (p.style.display === 'block') {
             renderRutas();
             document.getElementById('list-panel').style.display = 'none';
        }
    }

    function toggleListPanel() {
        var p = document.getElementById('list-panel');
        p.style.display = (p.style.display === 'none') ? 'block' : 'none';
        if (p.style.display === 'block') {
            renderListaClientes();
            document.getElementById('nav-panel').style.display = 'none';
        }
    }

    function renderRutas() {
        var c = document.getElementById('nav-links-container');
        c.innerHTML = '';
        for (var vend in infoRutas) {
            var sec = document.createElement('div');
            sec.style.marginBottom = '15px';
            sec.innerHTML = '<strong style="color:#666;font-size:13px;display:block;margin-bottom:5px;">👤 ' + vend + '</strong>';
            infoRutas[vend].forEach(function(link) {
                var a = document.createElement('a');
                a.href = link.url; a.target = '_blank';
                a.textContent = link.nombre;
                a.style.cssText = 'display:block;background:#f1f3f4;color:#1a73e8;' +
                    'padding:8px 12px;border-radius:8px;margin-bottom:5px;' +
                    'text-decoration:none;font-size:12px;font-weight:600;';
                a.onmouseover = function() { this.style.background = '#e8f0fe'; };
                a.onmouseout  = function() { this.style.background = '#f1f3f4'; };
                sec.appendChild(a);
            });
            c.appendChild(sec);
        }
    }

            d.onclick = function() {

            d.onmouseout  = function() { this.style.background = '#fff'; this.style.borderColor = '#eee'; };
            c.appendChild(d);
        });
    }

    function irAlCliente(lat, lng, nombre) {
        if (!window._mapaListo) return;
        window._mapaListo.setView([lat, lng], 18);
        
        // Buscar el marcador y abrir popup
        window._mapaListo.eachLayer(function(layer) {
            if (layer instanceof L.Marker && layer.options && (layer.options.alt === nombre || (layer.options.tooltip && layer.options.tooltip.getContent().includes(nombre)))) {
                layer.openPopup();
            }
        });

        if (window.innerWidth < 768) {
            document.getElementById('list-panel').style.display = 'none';
        }
    }

<script>
    // --- CONFIGURACION NUBE ---
    
    const JSONBIN_BIN_ID = '6a105aa66610dd3ae889da43';
    const JSONBIN_API_KEY = '$2a$10$XbSEDYDqGr6WwHfnYP2gQu07YA10s.clBAD4NP8ZDflkUr0ihvtA2';
    const NUBE_ACTIVA = true;
    

    window._mapaListo   = null;
    window._markerActual = null;

    function mostrarSync(texto, color) {
        const el = document.getElementById('sync-indicator');
        if (!el) return;
        el.textContent = texto;
        el.style.background = color || 'rgba(0,0,0,0.7)';
        el.style.display = 'block';
        el.style.opacity = '1';
        setTimeout(() => { el.style.opacity = '0'; setTimeout(() => { el.style.display = 'none'; }, 300); }, 2000);
    }

    // --- VISUAL ---
    window.marcarVisual = function(marker, entregado) {
        if (!marker) return;
        
        // Guardar el estado en las opciones del marker para persistencia
        if (!marker.options) marker.options = {};
        marker.options.isDelivered = entregado;

        if (marker._icon) {
            if (entregado) {
                marker._icon.classList.add('marker-delivered');
            } else {
                marker._icon.classList.remove('marker-delivered');
            }
        }
    };

    // --- JSONBIN CLOUD API ---
    async function leerNube() {
        if (!NUBE_ACTIVA) return null;
        try {
            const resp = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': JSONBIN_API_KEY }
            });
            if (!resp.ok) return null;
            const data = await resp.json();
            return data.record || data;
        } catch(e) { return null; }
    }

    async function escribirNube(estadoCompleto) {
        if (!NUBE_ACTIVA) return false;
        mostrarSync('&#9729; Sincronizando...', 'rgba(0,100,200,0.8)');
        try {
            // Leer estado actual para hacer MERGE (evitar sobrescribir cambios de otros)
            const actual = await leerNube();
            const entregasActuales = (actual && actual.entregas) ? actual.entregas : {};

            // Merge: combinar estado actual en nube + nuevos cambios
            const merged = { ...entregasActuales, ...estadoCompleto.entregas };
            const payload = {
                entregas: merged,
                ultima_sync: new Date().toISOString()
            };

            const resp = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Master-Key': JSONBIN_API_KEY
                },
                body: JSON.stringify(payload)
            });
            if (resp.ok) {
                mostrarSync('&#10003; Guardado en nube', 'rgba(0,150,50,0.8)');
                return true;
            }
        } catch(e) { console.warn('Error escribiendo en nube:', e); }
        mostrarSync('&#9888; Solo guardado local', 'rgba(200,100,0,0.8)');
        return false;
    }

    // --- LOCAL STORAGE FALLBACK ---
    function guardarLocal(id, delivered) {
        try { localStorage.setItem('entregas_' + id, delivered); } catch(e){}
    }
    function leerLocal(id) {
        const v = localStorage.getItem('entregas_' + id);
        return v === 'true' || v === true;
    }
    function leerTodosLocal() {
        const res = {};
        try {
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith('entregas_')) {
                    res[key.replace('entregas_', '')] = localStorage.getItem(key) === 'true';
                }
            }
        } catch(e){}
        return res;
    }

    // --- ESTADO UNIFICADO ---
    let _estadoNube = null;

    async function cargarEstados() {
        // Prioridad: Nube > Local
        const nube = await leerNube();
        if (nube && nube.entregas) {
            _estadoNube = nube.entregas;
            // Sincronizar nube -> local
            Object.entries(_estadoNube).forEach(([id, data]) => {
                const val = (typeof data === 'object') ? data.entregado : data;
                guardarLocal(id, val);
            });
            return _estadoNube;
        }
        // Fallback local
        return leerTodosLocal();
    }

    async function getStatus(id) {
        if (_estadoNube && id in _estadoNube) {
            const val = _estadoNube[id];
            return (typeof val === 'object') ? !!val.entregado : !!val;
        }
        return leerLocal(id);
    }

    // --- GUARDAR ENTREGA ---
    window.guardarEstadoEntrega = async function(btn) {
        try {
            const popup = btn.closest('.leaflet-popup-content') || btn.closest('.leaflet-popup-content-wrapper');
            const span = popup ? popup.querySelector('.bodega-nombre') : null;
            const chk  = popup ? popup.querySelector('.chk-entregado') : null;
            if (!span || !chk) return;

            const nombre      = span.textContent.trim();
            const nuevoEstado = chk.checked;

            // 1. Guardar local de inmediato (UX sin espera)
            guardarLocal(nombre, nuevoEstado);

            // 2. Actualizar visual
            if (window._markerActual) window.marcarVisual(window._markerActual, nuevoEstado);
            else reAplicarEstados();

            // 3. Feedback inmediato en boton
            const orig = btn.innerHTML;
            btn.innerHTML = 'GUARDANDO...';
            btn.style.background = '#0d6efd';

            // 4. Subir a la nube con merge
            const entregaData = {
                entregado: nuevoEstado,
                fecha: new Date().toISOString()
            };
            if (_estadoNube) _estadoNube[nombre] = entregaData;
            else _estadoNube = { [nombre]: entregaData };

            const nubeOk = await escribirNube({ entregas: { [nombre]: entregaData } });

            // Si fallo la nube, guardar en cola de reintentos
            if (!nubeOk && NUBE_ACTIVA) {
                try {
                    const cola = JSON.parse(localStorage.getItem('_vamys_retry_queue') || '[]');
                    cola.push({ [nombre]: entregaData });
                    localStorage.setItem('_vamys_retry_queue', JSON.stringify(cola));
                    console.log('[Vamys] Guardado en cola de reintentos');
                } catch(qe) {}
            }

            btn.innerHTML = nubeOk ? '✓ GUARDADO EN NUBE' : '✓ GUARDADO LOCAL';
            btn.style.background = nubeOk ? '#155724' : '#856404';
            setTimeout(() => { btn.innerHTML = orig; btn.style.background = '#28a745'; }, 1500);

        } catch (err) {
            console.error("Error al guardar:", err);
        }
    };

    async function reAplicarEstados() {
        if (!window._mapaListo) return;
        try {
            const estados = await cargarEstados();
            window._mapaListo.eachLayer(function(layer) {
                if (layer instanceof L.Marker && layer.options && layer.options.alt) {
                    const val = estados[layer.options.alt];
                    const entregado = (typeof val === 'object') ? !!val?.entregado : !!val;
                    window.marcarVisual(layer, entregado);
                }
            });
        } catch(e) { console.error("Error re-aplicando estados:", e); }
    }

    function inicializarVamys() {
        const mapEl = document.querySelector('.folium-map');
        if (!mapEl) { setTimeout(inicializarVamys, 500); return; }
        if (mapEl.offsetHeight === 0) { mapEl.style.height = '100vh'; mapEl.style.width = '100vw'; }

        let mapObj = null;
        try {
            if (mapEl.id && window[mapEl.id] && typeof window[mapEl.id].on === 'function') {
                mapObj = window[mapEl.id];
            } else {
                for (let key in window) {
                    if (key.startsWith('map_') && window[key] && typeof window[key].on === 'function') {
                        if (window[key].eachLayer) { mapObj = window[key]; break; }
                    }
                }
            }
        } catch(e){}

        if (!mapObj) { setTimeout(inicializarVamys, 500); return; }

        window._mapaListo  = mapObj;
        mapEl._leaflet_map = mapObj;

        // Escuchar cuando se agrega cualquier capa (muy útil para clusters)
        mapObj.on('layeradd', async (e) => {
            if (e.layer instanceof L.Marker && e.layer.options && e.layer.options.alt) {
                const entregado = await getStatus(e.layer.options.alt);
                window.marcarVisual(e.layer, entregado);
            }
        });

        // Mantener moveend/zoomend solo como backup ocasional
        mapObj.on('zoomend moveend spiderfied', () => setTimeout(reAplicarEstados, 500));

        mapObj.on('popupopen', async (e) => {
            const marker  = e.popup._source;
            if (!marker) return;
            const wrapper = e.popup._wrapper;
            const span    = wrapper ? wrapper.querySelector('.bodega-nombre') : null;
            const chk     = wrapper ? wrapper.querySelector('.chk-entregado') : null;
            if (!span || !chk) return;
            const nombre = span.textContent.trim();
            window._markerActual = marker;
            if (marker.options) marker.options.alt = nombre;
            chk.checked = await getStatus(nombre);
        });

        reAplicarEstados();

        // ── POLLING: actualizar desde la nube cada 15 segundos ──
        if (NUBE_ACTIVA) {
            console.log('[Vamys] Polling activo: sincronizando cada 15s desde JSONBin');
            setInterval(async () => {
                try {
                    _estadoNube = null; // forzar re-lectura
                    await reAplicarEstados();
                } catch(e) { console.warn('[Vamys] Error en polling:', e); }
            }, 15000);
        }

        // ── REINTENTAR escrituras fallidas guardadas en cola ──
        if (NUBE_ACTIVA) {
            setInterval(async () => {
                try {
                    const cola = JSON.parse(localStorage.getItem('_vamys_retry_queue') || '[]');
                    if (cola.length === 0) return;
                    console.log(`[Vamys] Reintentando ${cola.length} escrituras pendientes...`);
                    const exitosas = [];
                    for (const item of cola) {
                        const ok = await escribirNube({ entregas: item });
                        if (ok) exitosas.push(item);
                    }
                    // Quitar las exitosas de la cola
                    const restantes = cola.filter(c => !exitosas.includes(c));
                    localStorage.setItem('_vamys_retry_queue', JSON.stringify(restantes));
                    if (exitosas.length > 0) {
                        mostrarSync(`✓ ${exitosas.length} pendientes sincronizados`, 'rgba(0,150,50,0.8)');
                    }
                } catch(e) { console.warn('[Vamys] Error reintentando cola:', e); }
            }, 30000);
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener("DOMContentLoaded", inicializarVamys);
    } else {
        inicializarVamys();
    }
</script>
</body>
