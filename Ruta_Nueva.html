<script>
    // --- DATABASE INTERNA (IndexedDB) ---
    const DB_NAME = 'VamysRutasDB';
    const STORE_NAME = 'entregas';

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveStatus(id, delivered) {
        try {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.put({ id, delivered });
        } catch (e) { console.error("Error saving to DB:", e); }
    }

    async function getStatus(id) {
        try {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const req = store.get(id);
                req.onsuccess = () => resolve(req.result ? req.result.delivered : false);
                req.onerror = () => resolve(false);
            });
        } catch (e) { return false; }
    }

    async function getAllStatuses() {
        try {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            return new Promise((resolve) => {
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = () => resolve([]);
            });
        } catch (e) { return []; }
    }

    // --- LOGICA DE MAPA ---
    window._mapaListo = null;
    window._markerActual = null;

    // Visual: Cambiar PIN a VERDE usando filtros CSS
    function marcarVisual(marker, entregado) {
        if (!marker || !marker._icon) return;
        if (entregado) {
            marker._icon.style.filter  = 'hue-rotate(140deg) brightness(0.9) saturate(3)';
            marker._icon.style.opacity = '1';
        } else {
            marker._icon.style.filter  = '';
            marker._icon.style.opacity = '1';
        }
    }

    async function reAplicarEstados() {
        if (!window._mapaListo) return;
        const entries = await getAllStatuses();
        const stateMap = {};
        entries.forEach(e => stateMap[e.id] = e.delivered);

        window._mapaListo.eachLayer(function(layer) {
            if ((layer instanceof L.Marker || layer instanceof L.MarkerCluster) && layer.options && layer.options.alt) {
                var nombre = layer.options.alt;
                marcarVisual(layer, !!stateMap[nombre]);
            }
        });
    }

    // Definir globalmente para que el HTML lo vea
    window.guardarEstadoEntrega = async function(btn) {
        var wrapper = btn.closest('.leaflet-popup-content-wrapper');
        var span = wrapper ? wrapper.querySelector('.bodega-nombre') : null;
        var chk  = wrapper ? wrapper.querySelector('.chk-entregado') : null;
        if (!span || !chk) return;

        var nombre = span.textContent.trim();
        var nuevoEstado = chk.checked;
        
        await saveStatus(nombre, nuevoEstado);
        
        if (window._markerActual) marcarVisual(window._markerActual, nuevoEstado);
        
        // Feedback visual
        var originalText = btn.innerHTML;
        btn.innerHTML = '¡GUARDADO!';
        btn.style.background = '#155724';
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.style.background = '#28a745';
        }, 1500);
    };

    function inicializarVamys() {
        var mapEl = document.querySelector('.folium-map');
        if (!mapEl || !mapEl._leaflet_map) {
            console.log("Esperando inicialización del mapa...");
            setTimeout(inicializarVamys, 200);
            return;
        }

        const map = mapEl._leaflet_map;
        window._mapaListo = map;

        map.on('zoomend moveend spiderfied popupopen', function() { 
            setTimeout(reAplicarEstados, 300); 
        });

        map.on('popupopen', async function(e) {
            var marker = e.popup._source;
            if (!marker) return;
            
            var wrapper = e.popup._wrapper;
            var span = wrapper.querySelector('.bodega-nombre');
            var chk  = wrapper.querySelector('.chk-entregado');
            if (!span || !chk) return;
            
            var nombre = span.textContent.trim();
            window._markerActual = marker;
            if (marker.options) marker.options.alt = nombre;
            
            chk.checked = await getStatus(nombre);
        });

        reAplicarEstados();
    }

    document.addEventListener("DOMContentLoaded", inicializarVamys);
</script>
