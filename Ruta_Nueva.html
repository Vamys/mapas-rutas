        function toggleNavPanel() {
            var panel = document.getElementById('nav-panel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
                renderRutas();
            } else {
                panel.style.display = 'none';

        function renderRutas() {
            var container = document.getElementById('nav-links-container');
            container.innerHTML = '';
            
            for (var vendedor in infoRutas) {
                var section = document.createElement('div');
                section.style.marginBottom = '15px';
                section.innerHTML = '<strong style="color: #666; font-size: 13px; display: block; margin-bottom: 5px;">👤 ' + vendedor + '</strong>';
                
                infoRutas[vendedor].forEach(function(link) {
                    var a = document.createElement('a');
                    a.href = link.url;
                    a.target = '_blank';
                    a.className = 'nav-link-btn';
                    a.innerHTML = link.nombre;
                    a.style.display = 'block';
                    a.style.background = '#f1f3f4';
                    a.style.color = '#1a73e8';
                    a.style.padding = '8px 12px';
                    a.style.borderRadius = '8px';
                    a.style.marginBottom = '5px';
                    a.style.textDecoration = 'none';
                    a.style.fontSize = '12px';
                    a.style.fontWeight = '600';
                    a.onmouseover = function() { this.style.background = '#e8f0fe'; };
                    a.onmouseout = function() { this.style.background = '#f1f3f4'; };
                    section.appendChild(a);
                });
                container.appendChild(section);
            }
        }

    <script>
        // Diccionario global: nombre_bodega -> {marker, colorOriginal}
        window._mapaEntregas = {};
        
        document.addEventListener("DOMContentLoaded", function() {
            var map = document.querySelector('.folium-map')._leaflet_map;
            
            // Registrar todos los marcadores en el diccionario luego de que el mapa cargue
            function registrarMarcadores() {
                map.eachLayer(function(layer) {
                    if (layer instanceof L.Marker && layer._popup && layer._popup._content) {
                        try {
                            var parser = new DOMParser();
                            var doc = parser.parseFromString(layer._popup._content, 'text/html');
                            var spanNombre = doc.querySelector('.bodega-nombre');
                            var spanColor = doc.querySelector('.bodega-color');
                            if (spanNombre) {
                                var nombre = spanNombre.textContent.trim();
                                var color = spanColor ? spanColor.textContent.trim() : 'blue';
                                if (!window._mapaEntregas[nombre]) {
                                    window._mapaEntregas[nombre] = {
                                        marker: layer,
                                        colorOriginal: color
                                    };
                                }
                            }
                        } catch(ex) {}
                    }
                });
            }
            
            setTimeout(registrarMarcadores, 600);
            setTimeout(registrarMarcadores, 2000);
            
            function iconParaColor(color, entregado) {
                if (entregado) {
                    return L.AwesomeMarkers.icon({
                        icon: 'check',
                        prefix: 'fa',
                        markerColor: 'black'
                    });
                } else {
                    return L.AwesomeMarkers.icon({
                        icon: 'info-sign',
                        prefix: 'glyphicon',
                        markerColor: color
                    });
                }
            }
            
            function aplicarEstadosGuardados() {
                for (var nombre in window._mapaEntregas) {
                    var isEntregado = localStorage.getItem('entregado_' + nombre);
                    var entry = window._mapaEntregas[nombre];
                    if (isEntregado && entry.marker) {
                        try {
                            entry.marker.setIcon(iconParaColor(entry.colorOriginal, true));
                            if (entry.marker._icon) {
                                entry.marker._icon.style.opacity = '0.45';
                            }
                        } catch(ex) {}
                    }
                }
            }
            
            setTimeout(aplicarEstadosGuardados, 800);
            setTimeout(aplicarEstadosGuardados, 2200);
            
            // Re-aplicar despues de zoom/move porque MarkerCluster regenera iconos
            map.on('zoomend moveend', function() {
                setTimeout(aplicarEstadosGuardados, 150);
            });
            
            window.toggleEntregado = function(btn) {
                var container = btn.closest('div');
                if (!container) container = btn.parentElement;
                var spanNombre = container.querySelector('.bodega-nombre');
                if (!spanNombre) return;
                
                var nombre = spanNombre.textContent.trim();
                var key = 'entregado_' + nombre;
                var estaEntregado = !!localStorage.getItem(key);
                var entry = window._mapaEntregas[nombre];
                
                if (estaEntregado) {
                    // DESHACER
                    localStorage.removeItem(key);
                    btn.innerHTML = '✅ MARCAR ENTREGADO';
                    btn.style.backgroundColor = '#f8f9fa';
                    btn.style.color = '#333';
                    if (entry && entry.marker) {
                        try {
                            entry.marker.setIcon(iconParaColor(entry.colorOriginal, false));
                            if (entry.marker._icon) entry.marker._icon.style.opacity = '1';
                        } catch(ex) {}
                    }
                } else {
                    // MARCAR ENTREGADO
                    localStorage.setItem(key, 'true');
                    btn.innerHTML = '❌ DESHACER (Entregado)';
                    btn.style.backgroundColor = '#e0e0e0';
                    btn.style.color = '#555';
                    if (entry && entry.marker) {
                        try {
                            entry.marker.setIcon(iconParaColor(entry.colorOriginal, true));
                            if (entry.marker._icon) entry.marker._icon.style.opacity = '0.45';
                        } catch(ex) {}
                    }
                }
            };
            
            // Actualizar el boton del popup al abrirlo segun estado guardado
            map.on('popupopen', function(e) {
                try {
                    var btn = e.popup._wrapper.querySelector('.btn-entregado');
                    var span = e.popup._wrapper.querySelector('.bodega-nombre');
                    if (btn && span) {
                        var nombre = span.textContent.trim();
                        var isEntregado = localStorage.getItem('entregado_' + nombre);
                        if (isEntregado) {
                            btn.innerHTML = '❌ DESHACER (Entregado)';
                            btn.style.backgroundColor = '#e0e0e0';
                            btn.style.color = '#555';
                        } else {
                            btn.innerHTML = '✅ MARCAR ENTREGADO';
                            btn.style.backgroundColor = '#f8f9fa';
                            btn.style.color = '#333';
                        }
                    }
                } catch(ex) {}
            });
        });
    </script>
