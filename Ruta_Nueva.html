<script>
    // --- DATABASE INTERNA (IndexedDB) ---
    const DB_NAME = 'VamysRutasDB';
    const STORE_NAME = 'entregas';

    // --- DATABASE HIBRIDA (IndexedDB + LocalStorage Fallback) ---
    const DB_NAME = 'VamysRutasDB';
    const STORE_NAME = 'entregas';

    function openDB() {
        return new Promise((resolve, reject) => {
            if (!window.indexedDB) { reject("IndexedDB no soportado"); return; }
            const request = indexedDB.open(DB_NAME, 1);
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(STORE_NAME)) {
                    db.createObjectStore(STORE_NAME, { keyPath: 'id' });
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }

    async function saveStatus(id, delivered) {
        // Guardar en ambos para maxima seguridad
        try {
            localStorage.setItem('entregas_' + id, delivered);
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            store.put({ id, delivered });
        } catch (e) { console.warn("Fallback a localStorage activo para:", id); }
    }

    async function getStatus(id) {
        try {
            // Intentar IndexedDB
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const res = await new Promise((resolve) => {
                const req = store.get(id);
                req.onsuccess = () => resolve(req.result ? req.result.delivered : null);
                req.onerror = () => resolve(null);
            });
            if (res !== null) return res;
        } catch (e) { }
        // Fallback a localStorage
        const local = localStorage.getItem('entregas_' + id);
        return local === 'true' || local === true;
    }

    async function getAllStatuses() {
        let results = [];
        try {
            const db = await openDB();
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            results = await new Promise((resolve) => {
                const req = store.getAll();
                req.onsuccess = () => resolve(req.result || []);
                req.onerror = () => resolve([]);
            });
        } catch (e) { }
        
        // Combinar con localStorage
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('entregas_')) {
                const id = key.replace('entregas_', '');
                if (!results.find(r => r.id === id)) {
                    results.push({ id, delivered: localStorage.getItem(key) === 'true' });
                }
            }
        }
        return results;
    }

    // --- LOGICA DE MAPA ---
    window._mapaListo = null;
    window._markerActual = null;

    // Visual: Cambiar PIN a VERDE usando clases CSS
    function marcarVisual(marker, entregado) {
        if (!marker) return;
        
        // Aplicar a marcador individual
        if (marker._icon) {
            if (entregado) marker._icon.classList.add('marker-delivered');
            else           marker._icon.classList.remove('marker-delivered');
        }
        
        // Guardar estado en las opciones para cuando se redibuje (clusters)
        if (!marker.options) marker.options = {};
        marker.options.isDelivered = entregado;
    }

    async function reAplicarEstados() {
        if (!window._mapaListo) return;
        const entries = await getAllStatuses();
        const stateMap = {};
        entries.forEach(e => stateMap[e.id] = e.delivered);

        window._mapaListo.eachLayer(function(layer) {
            if (layer instanceof L.Marker && layer.options && layer.options.alt) {
                marcarVisual(layer, !!stateMap[layer.options.alt]);
            }
        });
    }

    // Definir globalmente para que el HTML lo vea
    window.guardarEstadoEntrega = async function(btn) {
        try {
            // Buscar por clase o por contenedor de popup
            var popup = btn.closest('.leaflet-popup-content') || btn.closest('.leaflet-popup-content-wrapper');
            var span = popup ? popup.querySelector('.bodega-nombre') : null;
            var chk  = popup ? popup.querySelector('.chk-entregado') : null;
            
            if (!span || !chk) {
                console.error("No se encontro info del cliente en el popup");
                return;
            }

            var nombre = span.textContent.trim();
            var nuevoEstado = chk.checked;
            
            console.log("Guardando estado para:", nombre, nuevoEstado);
            await saveStatus(nombre, nuevoEstado);
            
            if (window._markerActual) {
                marcarVisual(window._markerActual, nuevoEstado);
            } else {
                // Si perdimos la referencia, re-aplicamos a todo
                reAplicarEstados();
            }
            
            // Feedback visual en el boton
            var originalText = btn.innerHTML;
            btn.innerHTML = '¡GUARDADO!';
            btn.style.background = '#155724';
            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.style.background = '#28a745';
            }, 1500);
        } catch (err) {
            console.error("Error en guardarEstadoEntrega:", err);
            alert("Error al guardar: " + err.message);
        }
    };

    function inicializarVamys() {
        var mapEl = document.querySelector('.folium-map');
        if (!mapEl) {
            setTimeout(inicializarVamys, 500);
            return;
        }

        // Asegurar que el contenedor tenga altura (fix para algunos moviles)
        if (mapEl.offsetHeight === 0) {
            mapEl.style.height = '100vh';
            mapEl.style.width = '100vw';
        }

        // Intentar encontrar el objeto Mapa de Folium (map_xxxx)
        let mapObj = null;
        if (mapEl.id && window[mapEl.id] instanceof L.Map) {
            mapObj = window[mapEl.id];
        } else {
            for (let key in window) {
                if (key.startsWith('map_') && window[key] instanceof L.Map) {
                    mapObj = window[key];
                    break;
                }
            }
        }

        if (!mapObj) {
            console.log("Esperando objeto de mapa...");
            setTimeout(inicializarVamys, 500);
            return;
        }

        window._mapaListo = mapObj;
        mapEl._leaflet_map = mapObj; 

        mapObj.on('zoomend moveend spiderfied popupopen', function() { 
            setTimeout(reAplicarEstados, 300); 
        });

        mapObj.on('popupopen', async function(e) {
            var marker = e.popup._source;
            if (!marker) return;
            
            var wrapper = e.popup._wrapper;
            var span = wrapper ? wrapper.querySelector('.bodega-nombre') : null;
            var chk  = wrapper ? wrapper.querySelector('.chk-entregado') : null;
            if (!span || !chk) return;
            
            var nombre = span.textContent.trim();
            window._markerActual = marker;
            if (marker.options) marker.options.alt = nombre;
            
            chk.checked = await getStatus(nombre);
        });

        reAplicarEstados();
    }

    document.addEventListener("DOMContentLoaded", inicializarVamys);
</script>
